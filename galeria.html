    <!-- HERO -->
    <section class="hero">
        <h2>Galería de Ayekantún</h2>
        <p>Explora nuestros mejores momentos en pista y competencia.</p>
    </section>

    <!-- IMÁGENES -->
    <section class="contenido">
        <div class="galeria">
            <div class="foto">
                <img src="fotos%20y%20videos/IMG_20260502_114214.jpg"
                     alt="Clase de patinaje artístico"
                     onclick="abrirImagen(this.src, this.alt)">
                <button class="like-btn" onclick="darLike(this)" aria-label="Dar like">
                    ❤️ <span>0</span>
                </button>
            </div>

            <div class="foto">
                <img src="fotos%20y%20videos/IMG-20260503-WA0008.jpg"
                     alt="Alumnas en la pista de patinaje"
                     onclick="abrirImagen(this.src, this.alt)">
                <button class="like-btn" onclick="darLike(this)" aria-label="Dar like">
                    ❤️ <span>0</span>
                </button>
            </div>

            <div class="foto">
                <img src="fotos%20y%20videos/IMG_20260502_135042.jpg"
                     alt="Presentación de patinaje en Villa Alemana"
                     onclick="abrirImagen(this.src, this.alt)">
                <button class="like-btn" onclick="darLike(this)" aria-label="Dar like">
                    ❤️ <span>0</span>
                </button>
            </div>

            <div class="foto">
                <img src="fotos%20y%20videos/IMG_20260502_114212.jpg"
                     alt="Entrenamiento de patinaje"
                     onclick="abrirImagen(this.src, this.alt)">

            </div>

            <div class="foto">
                <img src="fotos%20y%20videos/IMG_20260502_114241.jpg"
                     alt="Patinaje en pista"
                     onclick="abrirImagen(this.src, this.alt)">
                <button class="like-btn" onclick="darLike(this)" aria-label="Dar like">
                    ❤️ <span>0</span>
                </button>
            </div>
        </div>
    </section>

    <div id="modal" class="modal" onclick="cerrarImagen(event)">
        <button class="modal-cerrar" onclick="cerrarImagen(event)" aria-label="Cerrar">✕</button>
        <img id="imagenGrande" src="" alt="">
    </div>

    <script src="main.js" defer></script>
